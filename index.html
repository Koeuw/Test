<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nutrition Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // 1. CONFIGURATION FIREBASE (METS TES CLÉS ICI)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDd-9vJ_5q58hF6RIdM4Fsx6VIQcNe9zNc",
            authDomain: "test-bb0ab.firebaseapp.com",
            projectId: "test-bb0ab",
            storageBucket: "test-bb0ab.firebasestorage.app",
            messagingSenderId: "845349088536",
            appId: "1:845349088536:web:9dea68916cfdc465b2826d",
            measurementId: "G-SVHDEZ1HX8"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // 2. INITIALISATION GLOBALE (POUR ÉVITER LES ERREURS)
        // ==========================================
        window.userProfile = { 
            darkMode: false, 
            goalCal: 2000, goalP: 150, goalG: 200, goalL: 60, goalS: 50, goalSalt: 5, goalVit: 100,
            currentCal: 2000, currentP: 150, currentG: 200, currentL: 60, currentS: 50, currentSalt: 5, currentVit: 100
        };

        // Surveillance de la connexion
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        window.userProfile = { ...window.userProfile, ...docSnap.data() };
                    }
                    applyUI();
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                } catch (e) {
                    console.error("Erreur de chargement Firestore:", e);
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // Fonctions Globales
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Erreur : " + err.message));
        };

        window.logout = () => signOut(auth);

        window.toggleTheme = async () => {
            window.userProfile.darkMode = !window.userProfile.darkMode;
            applyUI();
            const user = auth.currentUser;
            if (user) await setDoc(doc(db, "users", user.uid), window.userProfile, { merge: true });
        };

        window.addFood = async () => {
            const p = parseInt(document.getElementById('in-p').value) || 0;
            const g = parseInt(document.getElementById('in-g').value) || 0;
            const l = parseInt(document.getElementById('in-l').value) || 0;
            const s = parseInt(document.getElementById('in-s').value) || 0;
            const salt = parseFloat(document.getElementById('in-salt').value) || 0;
            const vit = parseInt(document.getElementById('in-vit').value) || 0;

            window.userProfile.currentCal -= (p*4 + g*4 + l*9);
            window.userProfile.currentP -= p;
            window.userProfile.currentG -= g;
            window.userProfile.currentL -= l;
            window.userProfile.currentS -= s;
            window.userProfile.currentSalt -= salt;
            window.userProfile.currentVit -= vit;

            applyUI();
            const user = auth.currentUser;
            if (user) await setDoc(doc(db, "users", user.uid), window.userProfile, { merge: true });
            
            ['in-p','in-g','in-l','in-s','in-salt','in-vit'].forEach(id => document.getElementById(id).value = "");
        };

        function applyUI() {
            const isDark = window.userProfile.darkMode;
            document.body.className = isDark ? "bg-slate-950 text-white" : "bg-slate-50 text-slate-900";
            
            const cards = document.querySelectorAll('.card-element');
            cards.forEach(card => {
                card.style.backgroundColor = isDark ? "#1e293b" : "#ffffff";
                card.style.borderColor = isDark ? "#334155" : "#f1f5f9";
            });

            document.getElementById('display-cal').innerText = window.userProfile.currentCal;
            document.getElementById('display-p').innerText = window.userProfile.currentP;
            document.getElementById('display-g').innerText = window.userProfile.currentG;
            document.getElementById('display-l').innerText = window.userProfile.currentL;
            document.getElementById('display-s').innerText = window.userProfile.currentS;
            document.getElementById('display-salt').innerText = window.userProfile.currentSalt.toFixed(1);
            document.getElementById('display-vit').innerText = window.userProfile.currentVit;
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }
    </script>
</head>
<body class="transition-colors duration-500 pb-20">

    <div id="login-screen" class="p-8 mt-20 max-w-sm mx-auto bg-white rounded-3xl shadow-xl card-element border text-black">
        <h2 class="text-3xl font-black mb-6">Nutrition.</h2>
        <input type="email" id="email" placeholder="Email" class="w-full bg-slate-100 p-4 rounded-2xl mb-4 outline-none">
        <input type="password" id="password" placeholder="Mot de passe" class="w-full bg-slate-100 p-4 rounded-2xl mb-8 outline-none">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold active:scale-95 transition-all">ENTRER</button>
    </div>

    <div id="main-app" class="hidden max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic">ULTRA TRACKER</h1>
            <button onclick="toggleTheme()" id="theme-icon" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow card-element border">🌙</button>
        </header>

        <div class="p-8 rounded-[2.5rem] shadow-sm mb-6 border text-center card-element">
            <p class="text-slate-400 text-[10px] font-black uppercase mb-2 tracking-widest">Restant</p>
            <div id="display-cal" class="text-6xl font-black tracking-tighter">2000</div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="p-4 rounded-3xl border card-element">
                <p class="text-[9px] font-bold text-orange-400 uppercase">Protéines</p>
                <div class="font-black text-xl"><span id="display-p">150</span>g</div>
            </div>
            <div class="p-4 rounded-3xl border card-element">
                <p class="text-[9px] font-bold text-blue-400 uppercase">Sucre / Glu</p>
                <div class="font-black text-xl"><span id="display-g">200</span>g / <span id="display-s" class="opacity-50 text-sm">50</span>g</div>
            </div>
            <div class="p-4 rounded-3xl border card-element">
                <p class="text-[9px] font-bold text-yellow-500 uppercase">Lipides / Sel</p>
                <div class="font-black text-xl"><span id="display-l">60</span>g / <span id="display-salt" class="opacity-50 text-sm">5</span>g</div>
            </div>
            <div class="p-4 rounded-3xl border card-element">
                <p class="text-[9px] font-bold text-purple-500 uppercase">Vitamines %</p>
                <div class="font-black text-xl"><span id="display-vit">100</span>%</div>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="in-p" placeholder="Prot" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
                <input type="number" id="in-g" placeholder="Glu" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
                <input type="number" id="in-s" placeholder="Sucre" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
                <input type="number" id="in-l" placeholder="Lip" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
                <input type="number" id="in-salt" placeholder="Sel" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
                <input type="number" id="in-vit" placeholder="Vit%" class="bg-slate-800 p-2 rounded-lg text-xs outline-none">
            </div>
            <button onclick="addFood()" class="w-full bg-white text-black p-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Enregistrer le repas</button>
            <button onclick="logout()" class="w-full text-slate-500 text-[10px] font-bold uppercase pt-2">Déconnexion</button>
        </div>
    </div>
</body>
</html>
