<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nutrition Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd-9vJ_5q58hF6RIdM4Fsx6VIQcNe9zNc",
            authDomain: "test-bb0ab.firebaseapp.com",
            projectId: "test-bb0ab",
            storageBucket: "test-bb0ab.firebasestorage.app",
            messagingSenderId: "845349088536",
            appId: "1:845349088536:web:9dea68916cfdc465b2826d",
            measurementId: "G-SVHDEZ1HX8"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.userProfile = { 
            darkMode: false, 
            goalCal: 2000, goalP: 150, goalG: 200, goalL: 60, goalS: 50, goalSalt: 5, goalVit: 100,
            currentCal: 2000, currentP: 150, currentG: 200, currentL: 60, currentS: 50, currentSalt: 5, currentVit: 100
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) window.userProfile = { ...window.userProfile, ...docSnap.data() };
                applyUI();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(err => alert(err.message));
        };

        window.nav = (target) => {
            document.getElementById('sec-tracker').classList.toggle('hidden', target !== 'tracker');
            document.getElementById('sec-calc').classList.toggle('hidden', target !== 'calc');
        };

        window.runCalc = async () => {
            const w = parseFloat(document.getElementById('c-w').value);
            const h = parseFloat(document.getElementById('c-h').value);
            const a = parseInt(document.getElementById('c-a').value);
            const act = parseFloat(document.getElementById('c-act').value);
            if(!w || !h || !a) return alert("Remplis tout !");

            const bmr = (10 * w) + (6.25 * h) - (5 * a) + 5;
            const tdee = Math.round(bmr * act);

            window.userProfile.goalCal = tdee;
            window.userProfile.currentCal = tdee;
            window.userProfile.goalP = Math.round(w * 2);
            window.userProfile.currentP = Math.round(w * 2);

            applyUI();
            const user = auth.currentUser;
            if (user) await setDoc(doc(db, "users", user.uid), window.userProfile);
            nav('tracker');
        };

        window.addFood = async () => {
            const p = parseInt(document.getElementById('in-p').value) || 0;
            const g = parseInt(document.getElementById('in-g').value) || 0;
            const l = parseInt(document.getElementById('in-l').value) || 0;
            window.userProfile.currentCal -= (p*4 + g*4 + l*9);
            window.userProfile.currentP -= p;
            applyUI();
            if (auth.currentUser) await setDoc(doc(db, "users", auth.currentUser.uid), window.userProfile);
            ['in-p','in-g','in-l'].forEach(id => document.getElementById(id).value = "");
        };

        function applyUI() {
            document.getElementById('display-cal').innerText = window.userProfile.currentCal;
            document.getElementById('display-p').innerText = window.userProfile.currentP;
            document.body.className = window.userProfile.darkMode ? "bg-slate-900 text-white" : "bg-slate-50 text-slate-900";
        }
    </script>
</head>
<body class="pb-32 transition-all">

    <div id="login-screen" class="p-8 mt-20 max-w-sm mx-auto bg-white rounded-3xl shadow-xl text-black">
        <h2 class="text-2xl font-black mb-6">Connexion</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-xl">
        <input type="password" id="password" placeholder="Pass" class="w-full p-4 mb-6 bg-slate-100 rounded-xl">
        <button onclick="login()" class="w-full p-4 bg-black text-white font-bold rounded-xl">ENTRER</button>
    </div>

    <div id="main-app" class="hidden max-w-md mx-auto p-4">
        
        <div id="sec-tracker">
            <div class="p-8 rounded-[2.5rem] shadow-sm mb-6 bg-white text-center text-black border">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Calories Restantes</p>
                <div id="display-cal" class="text-6xl font-black italic">2000</div>
            </div>
            <div class="bg-white p-4 rounded-2xl mb-6 text-black border">
                <p class="text-[10px] font-bold text-orange-400 uppercase">Protéines</p>
                <div class="text-2xl font-black"><span id="display-p">150</span>g</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl text-white space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="in-p" placeholder="P" class="bg-slate-800 p-2 rounded-lg text-sm">
                    <input type="number" id="in-g" placeholder="G" class="bg-slate-800 p-2 rounded-lg text-sm">
                    <input type="number" id="in-l" placeholder="L" class="bg-slate-800 p-2 rounded-lg text-sm">
                </div>
                <button onclick="addFood()" class="w-full p-4 bg-white text-black font-black rounded-xl">ENREGISTRER</button>
            </div>
        </div>

        <div id="sec-calc" class="hidden space-y-4">
            <h2 class="text-xl font-black mb-4">Calculateur de besoins</h2>
            <input type="number" id="c-w" placeholder="Poids (kg)" class="w-full p-4 rounded-xl bg-white border text-black">
            <input type="number" id="c-h" placeholder="Taille (cm)" class="w-full p-4 rounded-xl bg-white border text-black">
            <input type="number" id="c-a" placeholder="Âge" class="w-full p-4 rounded-xl bg-white border text-black">
            <select id="c-act" class="w-full p-4 rounded-xl bg-white border text-black">
                <option value="1.2">Sédentaire</option>
                <option value="1.55">Sportif (3-5x/sem)</option>
                <option value="1.9">Extrême (Pro)</option>
            </select>
            <button onclick="runCalc()" class="w-full p-4 bg-blue-600 text-white font-black rounded-xl">CALCULER MON OBJECTIF</button>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[200px] bg-white border shadow-2xl p-2 rounded-full flex justify-around items-center">
            <button onclick="nav('tracker')" class="p-2 text-xl">📊</button>
            <button onclick="nav('calc')" class="p-2 text-xl text-blue-500">🧬</button>
        </nav>
    </div>
</body>
</html>
