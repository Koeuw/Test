<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Coach Nutrition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd-9vJ_5q58hF6RIdM4Fsx6VIQcNe9zNc",
            authDomain: "test-bb0ab.firebaseapp.com",
            projectId: "test-bb0ab",
            storageBucket: "test-bb0ab.firebasestorage.app",
            messagingSenderId: "845349088536",
            appId: "1:845349088536:web:9dea68916cfdc465b2826d",
            measurementId: "G-SVHDEZ1HX8"
        };      
        // ----------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Gestion de la connexion
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .catch(error => alert("Erreur : " + error.message));
        };

        window.logout = () => signOut(auth);

        // Surveillance de l'état (Connecté ou non)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</head>
<body class="bg-slate-50 p-4">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl">
        <h2 class="text-3xl font-black mb-6 text-slate-800">Bonjour.</h2>
        <input type="email" id="email" placeholder="Email" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 focus:border-green-500 outline-none transition-all">
        <input type="password" id="password" placeholder="Mot de passe" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-6 focus:border-green-500 outline-none transition-all">
        <button onclick="login()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-lg shadow-green-200 active:scale-95 transition-transform">Entrer</button>
    </div>

    <div id="main-app" class="hidden max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-xs text-slate-400">Connecté en tant que</p>
                <p id="user-email" class="font-bold text-slate-700"></p>
            </div>
            <button onclick="logout()" class="bg-slate-200 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest text-slate-500">Quitter</button>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm mb-6 text-center border border-slate-100">
            <span class="text-slate-400 text-sm font-medium">Besoins du jour</span>
            <div id="remaining" class="text-6xl font-black text-slate-800 my-4">2200</div>
            <p class="text-slate-400">kcal restantes</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="bg-white p-6 rounded-3xl border-2 border-slate-100 font-bold text-slate-700 active:bg-slate-50">+100</button>
            <button class="bg-green-500 p-6 rounded-3xl font-bold text-white shadow-lg shadow-green-100 active:scale-95 transition-all">+500</button>
        </div>
    </div>

</body>
</html>
