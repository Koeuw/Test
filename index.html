<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nutrition Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd-9vJ_5q58hF6RIdM4Fsx6VIQcNe9zNc",
            authDomain: "test-bb0ab.firebaseapp.com",
            projectId: "test-bb0ab",
            storageBucket: "test-bb0ab.firebasestorage.app",
            messagingSenderId: "845349088536",
            appId: "1:845349088536:web:9dea68916cfdc465b2826d",
            measurementId: "G-SVHDEZ1HX8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Liste de tes 28 nutriments (ajoute ceux qui manquent ici)
        const microsList = [
            { id: 'Fiber', name: 'Fibres', unit: 'g', color: 'text-green-600' },
            { id: 'Omega', name: 'Oméga', unit: 'g', color: 'text-teal-600' },
            { id: 'Iron', name: 'Fer', unit: 'mg', color: 'text-red-500' },
            { id: 'Mag', name: 'Magnésium', unit: 'mg', color: 'text-purple-500' },
            { id: 'VitC', name: 'Vitamine C', unit: 'mg', color: 'text-orange-500' },
            { id: 'VitD', name: 'Vitamine D', unit: 'µg', color: 'text-yellow-600' },
            { id: 'Zinc', name: 'Zinc', unit: 'mg', color: 'text-blue-400' },
            { id: 'Calc', name: 'Calcium', unit: 'mg', color: 'text-slate-500' }
        ];

        window.userProfile = { 
            darkMode: false, 
            goalCal: 2000, goalP: 150, goalG: 200, goalL: 60, goalWater: 2.5,
            currentCal: 2000, currentP: 150, currentG: 200, currentL: 60, currentWater: 0
        };
        // Initialisation automatique des micros dans le profil
        microsList.forEach(m => {
            window.userProfile[`goal${m.id}`] = 100; // Valeur par défaut
            window.userProfile[`current${m.id}`] = 0;
        });

        window.applyUI = () => {
            const p = window.userProfile;
            document.body.className = p.darkMode ? "bg-slate-950 text-white" : "bg-slate-50 text-slate-900";
            
            // Macros de base
            document.getElementById('d-cal').innerText = Math.round(p.currentCal);
            document.getElementById('d-p').innerText = Math.round(p.currentP);
            document.getElementById('d-g').innerText = Math.round(p.currentG);
            document.getElementById('d-l').innerText = Math.round(p.currentL);
            document.getElementById('d-water').innerText = p.currentWater.toFixed(2);
            
            // Affichage DYNAMIQUE des micros (plus besoin de modifier le HTML)
            const container = document.getElementById('micros-container');
            container.innerHTML = microsList.map(m => `
                <div class="min-w-[120px] bg-white border p-4 rounded-2xl text-black snap-center shadow-sm">
                    <p class="text-[10px] font-bold ${m.color} uppercase">${m.name}</p>
                    <div class="font-black italic">${p[`current${m.id}`].toFixed(1)} / ${p[`goal${m.id}`]}${m.unit}</div>
                </div>
            `).join('');

            // Génération dynamique des INPUTS dans le formulaire
            const inputContainer = document.getElementById('micros-inputs');
            inputContainer.innerHTML = microsList.map(m => `
                <input type="number" id="in-${m.id}" placeholder="${m.name} (${m.unit})" class="bg-slate-800 p-3 rounded-xl text-xs outline-none text-white">
            `).join('');
        };

        window.saveData = async () => {
            const user = auth.currentUser;
            if (user) await setDoc(doc(db, "users", user.uid), window.userProfile);
        };

        window.addFood = () => {
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
            const p = getVal('in-p'), g = getVal('in-g'), l = getVal('in-l');
            
            window.userProfile.currentCal -= (p*4 + g*4 + l*9);
            window.userProfile.currentP -= p; 
            window.userProfile.currentG -= g; 
            window.userProfile.currentL -= l;
            
            // Ajout dynamique pour tous les micros
            microsList.forEach(m => {
                window.userProfile[`current${m.id}`] += getVal(`in-${m.id}`);
                document.getElementById(`in-${m.id}`).value = ""; // Reset champ
            });

            window.applyUI(); window.saveData();
            ['in-p','in-g','in-l'].forEach(id => document.getElementById(id).value = "");
        };

        // --- Fonctions Auth & Nav inchangées mais nécessaires ---
        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("Erreur d'identifiants."));
        window.logout = () => signOut(auth);
        window.nav = (target) => {
            document.getElementById('sec-tracker').classList.toggle('hidden', target !== 'tracker');
            document.getElementById('sec-calc').classList.toggle('hidden', target !== 'calc');
        };
        window.addWater = () => { window.userProfile.currentWater += 0.25; window.applyUI(); window.saveData(); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) window.userProfile = { ...window.userProfile, ...docSnap.data() };
                window.applyUI();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</head>
<body class="pb-32 transition-all font-sans">

    <div id="login-screen" class="max-w-sm mx-auto mt-20 p-8 bg-white rounded-3xl shadow-xl text-black border">
        <h2 class="text-3xl font-black mb-6">Nutrition Pro</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-100 rounded-xl outline-none">
        <input type="password" id="password" placeholder="Mot de passe" class="w-full p-4 mb-6 bg-slate-100 rounded-xl outline-none">
        <button onclick="window.login()" class="w-full p-4 bg-blue-600 text-white font-bold rounded-xl">CONNEXION</button>
    </div>

    <div id="main-app" class="hidden max-w-md mx-auto p-4">
        
        <div id="sec-tracker">
            <div class="bg-white border p-6 rounded-3xl shadow-sm mb-4 text-center text-black">
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Calories Restantes</p>
                <div id="d-cal" class="text-6xl font-black italic">2000</div>
                <div class="flex justify-around mt-6 border-t pt-4">
                    <div><p class="text-[10px] text-orange-400 font-bold uppercase">Prot</p><div class="font-black text-lg text-black"><span id="d-p">0</span>g</div></div>
                    <div><p class="text-[10px] text-blue-400 font-bold uppercase">Gluc</p><div class="font-black text-lg text-black"><span id="d-g">0</span>g</div></div>
                    <div><p class="text-[10px] text-yellow-500 font-bold uppercase">Lipi</p><div class="font-black text-lg text-black"><span id="d-l">0</span>g</div></div>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-100 p-4 rounded-3xl mb-4 flex justify-between items-center text-blue-900">
                <div><p class="text-[10px] font-black uppercase tracking-widest">Hydratation (L)</p>
                <div class="text-2xl font-black"><span id="d-water">0.00</span> / 2.50 L</div></div>
                <button onclick="window.addWater()" class="bg-blue-500 text-white w-12 h-12 rounded-full font-black text-xl shadow-lg">+</button>
            </div>

            <div id="micros-container" class="flex gap-3 overflow-x-auto pb-4 mb-4 snap-x no-scrollbar">
                </div>

            <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <input type="number" id="in-p" placeholder="Prot" class="bg-slate-800 p-3 rounded-xl text-sm outline-none">
                    <input type="number" id="in-g" placeholder="Gluc" class="bg-slate-800 p-3 rounded-xl text-sm outline-none">
                    <input type="number" id="in-l" placeholder="Lipi" class="bg-slate-800 p-3 rounded-xl text-sm outline-none">
                </div>
                <div id="micros-inputs" class="grid grid-cols-2 gap-2 mb-6">
                    </div>
                <button onclick="window.addFood()" class="w-full bg-white text-black p-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95">Enregistrer le repas</button>
            </div>
        </div>

        <div id="sec-calc" class="hidden space-y-4">
            <h2 class="text-xl font-black mb-4">Paramètres</h2>
            <button onclick="window.logout()" class="w-full bg-red-100 text-red-600 p-4 rounded-xl font-bold">Déconnexion</button>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[220px] bg-white/90 backdrop-blur-md border shadow-2xl p-2 rounded-full flex justify-around items-center text-black">
            <button onclick="window.nav('tracker')" class="p-3 text-xl">📊</button>
            <button onclick="window.userProfile.darkMode = !window.userProfile.darkMode; window.applyUI(); window.saveData();" class="p-3 text-xl">🌓</button>
            <button onclick="window.nav('calc')" class="p-3 text-xl">⚙️</button>
        </nav>
    </div>
</body>
</html>
